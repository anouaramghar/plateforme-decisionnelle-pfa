version: '3.8'

services:
  # 1. Base de données SQL Server
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD}", "-Q", "SELECT 1", "-C"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - pfa_internal_ml

  # 2. Backend ASP.NET Core 8
  backend:
    build:
      context: ./backend
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=${DB_NAME};User=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      - ML_API_URL=${ML_API_URL}
      - ASPNETCORE_URLS=http://+:8080
      - JWT_SECRET=${JWT_SECRET}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pfa_public
      - pfa_internal_ml

  # 3. Microservice IA (Python 3.11 / FastAPI)
  ml-service:
    build:
      context: ./ml_service
    expose:
      - "8000" # Expose le port uniquement au réseau interne
    networks:
      - pfa_internal_ml

  # 4. Frontend React.js
  frontend:
    build:
      context: ./frontend
    networks:
      - pfa_public

  # 5. Reverse Proxy Nginx
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - pfa_public

networks:
  pfa_public:
    driver: bridge
  pfa_internal_ml:
    driver: bridge
    internal: true